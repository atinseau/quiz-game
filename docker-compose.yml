services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: quiz-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: quiz
    ports:
      - "5432:5432"
    volumes:
      - quiz-postgres-data:/var/lib/postgresql/data
      - ./scripts/pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d quiz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  quiz-postgres-data:
