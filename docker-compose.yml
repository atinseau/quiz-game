services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: quiz-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quiz-postgres-data:/var/lib/postgresql/data
      - ./scripts/pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-quiz}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  quiz-postgres-data:
